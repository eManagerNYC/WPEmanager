<div class="em-auth-wrap d-flex align-items-center justify-content-center">
	<div class="card em-auth-card shadow-sm">
		<div class="card-body p-4">
			<h1 class="h4 mb-1 text-center"><i class="bi bi-buildings me-2" aria-hidden="true"></i>eManager</h1>
			<p class="text-secondary text-center mb-4">Construction Management Dashboard</p>
			{{banner}}
			<form method="post" novalidate>
				{{nonce}}
				<div class="mb-3">
					<label class="form-label" for="em-email">Email or username</label>
					<input class="form-control" type="text" id="em-email" name="em_email" required autocomplete="username" autofocus />
				</div>
				<div class="mb-3">
					<label class="form-label" for="em-password">Password</label>
					<input class="form-control" type="password" id="em-password" name="em_password" required autocomplete="current-password" />
				</div>
				<div class="mb-3 form-check">
					<input class="form-check-input" type="checkbox" id="em-remember" name="em_remember" value="1" />
					<label class="form-check-label" for="em-remember">Remember me</label>
				</div>
				<button class="btn btn-primary w-100" type="submit">Sign in</button>
			</form>
			<div class="d-flex justify-content-between mt-3 small">
				<a href="{{register_url}}">Create an account</a>
				<a href="{{lost_url}}">Forgot password?</a>
			</div>
		</div>
	</div>
</div>
